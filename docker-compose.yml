x-backend-environment: &backend-environment
  APP_NAME: "AI-Assisted Workflow Builder API"
  APP_VERSION: "0.1.0"
  ENVIRONMENT: "development"
  CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
  MONGODB_URL: "mongodb://mongo:27017"
  MONGODB_DATABASE: "workflow_builder"
  REDIS_URL: "redis://redis:6379/0"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_FAIL_OPEN: "true"
  SCHEDULER_POLL_SECONDS: "1"
  OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
  OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4-nano}"
  JWT_SECRET_KEY: "${JWT_SECRET_KEY:-change-me-in-production-with-a-long-random-secret}"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_MINUTES: "15"
  REFRESH_TOKEN_DAYS: "30"

services:
  api:
    build:
      context: ./backend
    environment:
      <<: *backend-environment
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.workers.scheduler"]
    environment:
      <<: *backend-environment
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "http://localhost:8000"
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  redis_data:
